<div id="ai-chatbot" class="fixed bottom-6 right-6 z-[1000] font-sans">

    <!-- Window -->
    <div id="chat-window"
        class="hidden absolute bottom-20 right-0 w-[350px] sm:w-[400px] h-[550px] max-h-[80vh] flex flex-col bg-white/95 backdrop-blur-xl border border-emerald-100 shadow-[0_10px_40px_-10px_rgba(6,78,59,0.2)] rounded-2xl overflow-hidden transition-all duration-300 transform scale-95 opacity-0 origin-bottom-right">

        <!-- Header -->
        <div
            class="flex items-center justify-between px-5 py-4 bg-emerald-900 border-b border-emerald-800 text-white shrink-0">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div
                        class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center border-2 border-emerald-700/50">
                        <i data-lucide="leaf" class="w-5 h-5 text-emerald-800"></i>
                    </div>
                    <div
                        class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 border-2 border-emerald-900 rounded-full">
                    </div>
                </div>
                <div>
                    <h3 class="font-art font-bold text-lg leading-tight">TeaZen Advisor</h3>
                    <p class="text-xs text-emerald-200 font-medium">Sẵn sàng hỗ trợ bạn</p>
                </div>
            </div>
            <button id="close-chat"
                class="p-2 hover:bg-emerald-800 rounded-lg transition-colors text-emerald-100 hover:text-white">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" class="flex-1 p-5 overflow-y-auto space-y-4 bg-stone-50/50 scroll-smooth">
            <!-- Initial Greeting -->
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-emerald-100 flex-shrink-0 flex items-center justify-center mt-1">
                    <i data-lucide="leaf" class="w-4 h-4 text-emerald-800"></i>
                </div>
                <div
                    class="bg-white border border-stone-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm text-sm text-stone-700 max-w-[85%]">
                    Xin chào! Tôi là trợ lý của TeaZen. Tôi có thể giúp bạn tìm hiểu về các loại trà hoặc ấm chén nghệ
                    thuật nào hôm nay?
                </div>
            </div>
        </div>

        <!-- Typing Indicator (Hidden by default) -->
        <div id="typing-indicator" class="hidden px-5 pb-2 bg-stone-50/50">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-emerald-100 flex-shrink-0 flex items-center justify-center">
                    <i data-lucide="leaf" class="w-4 h-4 text-emerald-800"></i>
                </div>
                <div
                    class="bg-white border border-stone-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm flex items-center gap-1 w-max">
                    <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                    <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce"></div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-stone-100 shrink-0">
            <form id="chat-form" class="relative flex items-end gap-2">
                <textarea id="chat-input" rows="1" placeholder="Nhắn tin cho tôi..."
                    class="w-full bg-stone-100 border border-transparent rounded-xl py-3 px-4 pr-12 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:bg-white focus:border-emerald-200 transition-all text-sm resize-none"></textarea>
                <button type="submit" id="send-btn"
                    class="absolute right-2 bottom-2 p-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="send" class="w-4 h-4 translate-x-px -translate-y-px"></i>
                </button>
            </form>
            <div class="mt-2 text-center">
                <span class="text-[10px] text-stone-400">Powered by Gemini AI</span>
            </div>
        </div>
    </div>

    <!-- Bubble Button -->
    <button id="chat-bubble"
        class="group relative flex items-center justify-center w-16 h-16 bg-emerald-900 shadow-[0_4px_20px_rgba(6,78,59,0.3)] rounded-full hover:scale-105 hover:shadow-[0_4px_25px_rgba(16,185,129,0.4)] transition-all duration-300">
        <!-- Glow effect -->
        <div
            class="absolute inset-0 rounded-full bg-emerald-500 blur-md opacity-0 group-hover:opacity-40 transition-opacity duration-300">
        </div>
        <i data-lucide="message-circle"
            class="w-8 h-8 text-white relative z-10 transition-transform duration-300 group-hover:-rotate-12"></i>
        <!-- Notification dot -->
        <div class="absolute top-0 right-0 w-4 h-4 bg-red-500 border-2 border-white rounded-full"></div>
    </button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Ensure icons in chatbot render even if included after main initialization
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        const bubble = document.getElementById("chat-bubble");
        const windowEl = document.getElementById("chat-window");
        const closeBtn = document.getElementById("close-chat");
        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");
        const messagesEl = document.getElementById("chat-messages");
        const typingIndicator = document.getElementById("typing-indicator");
        const sendBtn = document.getElementById("send-btn");

        let isWindowOpen = false;
        let historyLoaded = false;
        let isWaitingForAI = false;

        const getCSRFToken = () => {
            return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        };

        const toggleWindow = () => {
            isWindowOpen = !isWindowOpen;
            if (isWindowOpen) {
                windowEl.classList.remove("hidden");
                // Trigger animation
                setTimeout(() => {
                    windowEl.classList.remove("scale-95", "opacity-0");
                    windowEl.classList.add("scale-100", "opacity-100");

                    // Hide notification dot on bubble
                    const dot = bubble.querySelector('.bg-red-500');
                    if (dot) dot.classList.add('hidden');
                }, 10);

                chatInput.focus();
                if (!historyLoaded) loadHistory();
            } else {
                windowEl.classList.remove("scale-100", "opacity-100");
                windowEl.classList.add("scale-95", "opacity-0");
                setTimeout(() => windowEl.classList.add("hidden"), 300);
            }
        };

        bubble.addEventListener("click", toggleWindow);
        closeBtn.addEventListener("click", toggleWindow);

        // Auto-resize textarea
        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 100 ? this.scrollHeight : 100) + 'px';
            sendBtn.disabled = this.value.trim().length === 0;
        });

        const scrollToBottom = () => {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        };

        const formatTime = (isoString) => {
            const date = new Date(isoString);
            return date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        };

        // Hàm chuyển đổi nội dung Markdown cơ bản thành HTML
        const formatMessageContent = (content) => {
            if (!content) return '';

            let htmlContent = content;

            // Xử lý xuống dòng: Chuyển \n thành <br>
            htmlContent = htmlContent.replace(/\n/g, '<br>');

            // Xử lý Markdown in đậm: **text** -> <strong>text</strong>
            htmlContent = htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            htmlContent = htmlContent.replace(/(?<!\*)\*(?!\*)(.*?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

            htmlContent = htmlContent.replace(/<br>\* (.*?)(?=<br>|$)/g, '<br>• $1');

            return htmlContent;
        };

        const appendMessage = (sender, content, timeString = null, products = []) => {
            const time = timeString ? formatTime(timeString) : formatTime(new Date().toISOString());
            const msgDiv = document.createElement("div");
            msgDiv.className = "flex gap-3 w-full " + (sender === "user" ? "justify-end" : "");

            const formattedContent = formatMessageContent(content);

            let html = "";
            if (sender === "ai") {
                html = `
                <div class="w-8 h-8 rounded-full bg-emerald-100 flex-shrink-0 flex items-center justify-center mt-1">
                    <i data-lucide="leaf" class="w-4 h-4 text-emerald-800"></i>
                </div>
                <div class="flex flex-col gap-2 max-w-[85%]">
                    <div class="bg-white border border-stone-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm text-sm text-stone-700 leading-relaxed">
                        ${formattedContent}
                    </div>
                    ${products && products.length > 0 ? `
                    <div class="flex flex-col gap-2 w-full mt-1">
                        ${products.map(p => `
                        <a href="${p.detail_url}" target="_blank" class="flex items-center gap-3 p-2 rounded-xl bg-white border border-stone-100 shadow-sm hover:shadow-md hover:border-emerald-200 transition-all group no-underline relative overflow-hidden">
                            <div class="w-14 h-14 rounded-lg bg-stone-100 flex-shrink-0 overflow-hidden relative">
                                ${p.image_url ? `<img src="${p.image_url}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">` : `<i data-lucide="image" class="w-6 h-6 text-stone-300 absolute inset-0 m-auto"></i>`}
                            </div>
                            <div class="flex flex-col overflow-hidden w-full">
                                <h4 class="text-xs font-medium text-stone-800 truncate">${p.title}</h4>
                                <span class="text-xs font-semibold text-emerald-600 mt-0.5">${p.price.toLocaleString('vi-VN')} đ</span>
                            </div>
                            <div class="absolute inset-y-0 right-2 flex items-center opacity-0 group-hover:opacity-100 transform translate-x-2 group-hover:translate-x-0 transition-all">
                                <i data-lucide="chevron-right" class="w-4 h-4 text-emerald-600"></i>
                            </div>
                        </a>
                        `).join('')}
                    </div>
                    ` : ""}
                    <span class="text-[10px] items-start text-stone-400 ml-1">${time}</span>
                </div>
            `;
            } else {
                html = `
                <div class="flex flex-col gap-1 items-end max-w-[85%]">
                    <div class="bg-emerald-600 rounded-2xl rounded-tr-sm px-4 py-3 shadow-sm text-sm text-white leading-relaxed">
                        ${formattedContent}
                    </div>
                    <span class="text-[10px] text-stone-400 mr-1">${time}</span>
                </div>
            `;
            }

            msgDiv.innerHTML = html;
            messagesEl.appendChild(msgDiv);

            // Re-init lucide icons for new messages
            if (typeof lucide !== 'undefined') lucide.createIcons();
            scrollToBottom();
        };

        const loadHistory = async () => {
            try {
                const res = await fetch("/api/chatbot/history/");
                const data = await res.json();
                if (data.messages && data.messages.length > 0) {
                    messagesEl.innerHTML = ''; // Clear initial greeting if history exists
                    data.messages.forEach(m => appendMessage(m.sender, m.content, m.created_at));
                }
                historyLoaded = true;
            } catch (e) {
                console.error("Error loading chat history:", e);
            }
        };

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text || isWaitingForAI) return;
            isWaitingForAI = true;
            chatInput.value = '';
            chatInput.style.height = 'auto'; 
            sendBtn.disabled = true;
            chatInput.disabled = true;
            appendMessage("user", text);
            typingIndicator.classList.remove("hidden");
            scrollToBottom();

            try {
                const res = await fetch("/api/chatbot/chat/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCSRFToken()
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await res.json();
                typingIndicator.classList.add("hidden");

                if (data.content) {
                    appendMessage("ai", data.content, null, data.recommended_products || []);
                } else {
                    appendMessage("ai", "Xin lỗi, đã có lỗi xảy ra. Hãy thử lại sau nhé.");
                }

            } catch (e) {
                console.error("Chat error:", e);
                typingIndicator.classList.add("hidden");
                appendMessage("ai", "Xin lỗi, không thể kết nối đến máy chủ.");
            } finally {
                // Re-enable input
                isWaitingForAI = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        });
        chatInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });
    });
</script>
