{% extends 'admin/base_admin.html' %}

{% block page_title %}Đổi mật khẩu{% endblock %}
{% block page_subtitle %}Đổi mật khẩu cho người dùng: {{ user_to_reset.username }}{% endblock %}

{% block admin_content %}
<div class="max-w-md">
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
        <form method="post" class="p-8">
            {% csrf_token %}
            
            <div class="space-y-6">
                <div>
                    <label for="new_password" class="block text-sm font-bold text-stone-700 mb-2">
                        Mật khẩu mới <span class="text-red-500">*</span>
                    </label>
                    <input type="password" name="new_password" id="new_password" required
                        class="w-full px-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:border-emerald-600">
                </div>
            </div>

            <div class="flex items-center gap-4 mt-8 pt-6 border-t border-stone-100">
                <button type="submit" class="bg-amber-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-amber-700 transition-all shadow-lg shadow-amber-200">
                    Cập nhật mật khẩu
                </button>
                <a href="{% url 'admin_user_list' %}" class="px-6 py-3 text-stone-500 hover:text-stone-800 hover:bg-stone-50 rounded-xl transition-all">
                    Hủy bỏ
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
