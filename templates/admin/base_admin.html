{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-stone-50 py-12">
    <div class="container mx-auto px-6">
        <div class="flex flex-col md:flex-row gap-8">
            <!-- Sidebar -->
            <aside class="w-full md:w-64 flex-shrink-0">
                <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-6 sticky top-24">
                    <h3 class="font-art text-xl font-bold text-emerald-900 mb-6">Quản Trị</h3>
                    <nav class="space-y-2">
                        <a href="{% url 'admin_dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                        </a>
                        <a href="{% url 'admin_statistics' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if request.resolver_match.url_name == 'admin_statistics' %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Thống Kê
                        </a>
                        <a href="{% url 'admin_inventory' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if request.resolver_match.url_name == 'admin_inventory' or 'admin_order' in request.resolver_match.url_name %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="package" class="w-5 h-5"></i> Kho & Đơn Hàng
                        </a>
                        <a href="{% url 'admin_return_list' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if 'return' in request.resolver_match.url_name %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i> Đổi Trả Hàng
                        </a>
                        <div class="border-t border-stone-100 my-2"></div>
                        <a href="{% url 'product_list' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if 'product' in request.resolver_match.url_name %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="coffee" class="w-5 h-5"></i> Sản Phẩm
                        </a>
                        <a href="{% url 'category_list' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if 'category' in request.resolver_match.url_name %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="layers" class="w-5 h-5"></i> Danh Mục
                        </a>
                        <a href="{% url 'storyboard_list' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if 'storyboard' in request.resolver_match.url_name %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="film" class="w-5 h-5"></i> Storyboard
                        </a>
                         <a href="{% url 'raw_list' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if 'raw' in request.resolver_match.url_name %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="image" class="w-5 h-5"></i> Raw Gallery
                        </a>
                         <a href="{% url 'cabinet_list' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 hover:bg-emerald-50 hover:text-emerald-800 transition-colors {% if 'cabinet' in request.resolver_match.url_name %}bg-emerald-50 text-emerald-800 font-medium{% endif %}">
                            <i data-lucide="archive" class="w-5 h-5"></i> Cabinet
                        </a>
                    </nav>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 min-w-0">
                <div class="mb-8">
                    <h1 class="font-art text-3xl font-bold text-stone-800">{% block page_title %}{% endblock %}</h1>
                    <p class="text-stone-500 mt-2">{% block page_subtitle %}{% endblock %}</p>
                </div>
                
                {% block admin_content %}{% endblock %}
            </main>
        </div>
    </div>
</div>
{% endblock %}
